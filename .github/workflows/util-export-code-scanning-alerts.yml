name: 'Util: Export Code Scanning Alerts'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: read

jobs:
  export_code_scanning_alerts:
    name: Export code scanning alerts
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-2vcpu-ubuntu-2204' }}
    env:
      OUTPUT_PATH: code-scanning/alerts.json
    steps:
      - name: Export code scanning alerts
        id: export
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          from datetime import UTC, datetime
          import json
          import os
          import re
          from urllib.error import HTTPError, URLError
          from pathlib import Path
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          github_api_url = os.environ['GITHUB_API_URL']
          github_output_path = os.environ.get('GITHUB_OUTPUT')
          output_path = Path(os.environ['OUTPUT_PATH'])
          owner, repo = os.environ['REPOSITORY'].split('/', 1)
          states = ('open', 'closed')
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f"Bearer {os.environ['GITHUB_TOKEN']}",
              'X-GitHub-Api-Version': '2022-11-28',
          }

          if not github_output_path:
              raise SystemExit('GitHub code scanning export requires GITHUB_OUTPUT to be set')

          def fetch_alerts(state: str) -> list[dict]:
              query = urlencode({'per_page': 100, 'state': state})
              next_url = f'{github_api_url}/repos/{owner}/{repo}/code-scanning/alerts?{query}'
              alerts = []

              while next_url:
                  request = Request(next_url, headers=headers)
                  try:
                      with urlopen(request) as response:
                          alerts.extend(json.load(response))
                          link_header = response.headers.get('Link', '')
                  except HTTPError as exc:
                      response_body = exc.read().decode('utf-8', errors='replace').strip()
                      raise SystemExit(
                          f'GitHub code scanning export failed with HTTP {exc.code} {exc.reason} while requesting {next_url}: {response_body}',
                      ) from exc
                  except URLError as exc:
                      raise SystemExit(
                          f'GitHub code scanning export failed while requesting {next_url}: {exc.reason}',
                      ) from exc

                  next_match = re.search(r'<([^>]+)>; rel="next"', link_header)
                  next_url = next_match.group(1) if next_match else None

              return alerts

          alerts = [alert for state in states for alert in fetch_alerts(state)]
          export_payload = {
              'repository': f'{owner}/{repo}',
              'exportedAt': datetime.now(UTC).isoformat(),
              'alertCount': len(alerts),
              'alerts': alerts,
          }

          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(f'{json.dumps(export_payload, indent=2)}\n', encoding='utf-8')

          with open(github_output_path, 'a', encoding='utf-8') as github_output:
              github_output.write(f'alerts_count={len(alerts)}\n')
          PY

      - name: Upload code scanning alerts artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.6.2
        with:
          name: code-scanning-alerts-export
          path: ${{ env.OUTPUT_PATH }}
          if-no-files-found: error

      - name: Log exported alert count
        run: echo "Exported $ALERTS_COUNT code scanning alerts"
        env:
          ALERTS_COUNT: ${{ steps.export.outputs.alerts_count }}
